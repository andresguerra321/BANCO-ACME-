<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Acme - Recuperar Contraseña</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container auth-container">
        <div class="auth-card glass-panel">
            <div class="logo">
                <h2>Banco Acme</h2>
            </div>
            <h1>Recuperar Contraseña</h1>
            
            <form id="recoverForm">
                <p class="subtitle">Ingresa tus datos para validar tu identidad</p>
                <div class="form-group">
                    <label for="docType">Tipo de Identificación</label>
                    <select id="docType" required>
                        <option value="">Seleccione...</option>
                        <option value="CC">Cédula de Ciudadanía</option>
                        <option value="CE">Cédula de Extranjería</option>
                        <option value="NIT">NIT</option>
                        <option value="TI">Tarjeta de Identidad</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="docNumber">Número de Identificación</label>
                    <input type="text" id="docNumber" required>
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-actions space-between">
                    <a href="index.html" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Validar</button>
                </div>
            </form>

            <form id="newPasswordForm" class="hidden">
                <p class="subtitle">Validación exitosa. Ingresa tu nueva contraseña</p>
                <div class="form-group">
                    <label for="newPassword">Nueva Contraseña</label>
                    <input type="password" id="newPassword" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirmar Contraseña</label>
                    <input type="password" id="confirmPassword" required>
                </div>
                <div class="form-actions space-between">
                    <a href="index.html" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Guardar Contraseña</button>
                </div>
            </form>
        </div>
    </div>
    <div id="toastContainer"></div>
    <script type="module" src="js/forgot.js"></script>
</body>
</html>
