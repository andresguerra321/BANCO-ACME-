<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Acme - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="split-layout">
    <div class="split-left">
        <div class="brand">
            <img src="img/ChatGPT Image 10 abr 2026, 08_13_43 a.m..png" alt="Banco Acme Logo" class="logo-img">
            <h1>Banco Acme.</h1>
            <p>El poder de la simplicidad<br>en tus finanzas.</p>
        </div>
    </div>
    <div class="split-right">
        <div class="auth-wrapper">
            <div class="auth-header">
                <h2>Iniciar sesión</h2>
                <p class="text-muted">Ingresa a tu portal financiero.</p>
            </div>
            <form id="loginForm" class="minimal-form">
                <div class="input-modern">
                    <select id="docType" required>
                        <option value="" disabled selected>Tipo de Documento</option>
                        <option value="CC">Cédula de Ciudadanía</option>
                        <option value="CE">Cédula de Extranjería</option>
                        <option value="NIT">Identidad Tributaria</option>
                    </select>
                </div>
                <div class="input-modern">
                    <input type="text" id="docNumber" placeholder="Número de Documento" required oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
                <div class="input-modern">
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" checked="checked">
                        <span class="checkmark"></span>
                        Recordarme
                    </label>
                    <a href="forgot.html" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>
                <button type="submit" class="btn-premium">Continuar <span class="arrow">→</span></button>
            </form>
            <div class="auth-footer-modern">
                <p>¿No tienes una cuenta? <a href="register.html">Regístrate ahora</a></p>
            </div>
        </div>
    </div>
    <div id="toastContainer"></div>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
