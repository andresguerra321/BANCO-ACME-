<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Acme - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container auth-container">
        <div class="auth-card glass-panel">
            <div class="logo">
                <h2>Banco Acme</h2>
            </div>
            <h1>Iniciar Sesión</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label for="docType">Tipo de Identificación</label>
                    <select id="docType" required>
                        <option value="">Seleccione...</option>
                        <option value="CC">Cédula de Ciudadanía</option>
                        <option value="CE">Cédula de Extranjería</option>
                        <option value="NIT">NIT</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="docNumber">Número de Identificación</label>
                    <input type="text" id="docNumber" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
            </form>
            <div class="auth-links">
                <a href="register.html">Crear cuenta</a>
                <a href="forgot.html">Recordar contraseña</a>
            </div>
        </div>
    </div>
    <div id="toastContainer"></div>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
