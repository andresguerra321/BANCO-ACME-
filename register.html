<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Acme - Registro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container register-container">
        <div class="auth-card glass-panel">
            <div class="logo">
                <h2>Banco Acme</h2>
            </div>
            <h1>Crear Cuenta</h1>
            <div id="registerFormContainer">
                <form id="registerForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="docType">Tipo de Identificación</label>
                            <select id="docType" required>
                                <option value="">Seleccione...</option>
                                <option value="CC">Cédula de Ciudadanía</option>
                                <option value="CE">Cédula de Extranjería</option>
                                <option value="TI">Tarjeta de Identidad</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="docNumber">Número de Identificación</label>
                            <input type="text" id="docNumber" required>
                        </div>
                        <div class="form-group">
                            <label for="names">Nombres</label>
                            <input type="text" id="names" required>
                        </div>
                        <div class="form-group">
                            <label for="surnames">Apellidos</label>
                            <input type="text" id="surnames" required>
                        </div>
                        <div class="form-group">
                            <label for="gender">Género</label>
                            <select id="gender" required>
                                <option value="">Seleccione...</option>
                                <option value="M">Masculino</option>
                                <option value="F">Femenino</option>
                                <option value="O">Otro</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="phone">Teléfono</label>
                            <input type="tel" id="phone" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Correo Electrónico</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label for="city">Ciudad de Residencia</label>
                            <input type="text" id="city" required>
                        </div>
                        <div class="form-group full-width">
                            <label for="address">Dirección</label>
                            <input type="text" id="address" required>
                        </div>
                        <div class="form-group full-width">
                            <label for="password">Contraseña</label>
                            <input type="password" id="password" required>
                        </div>
                    </div>
                    <div class="form-actions space-between">
                        <a href="index.html" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Crear Cuenta</button>
                    </div>
                </form>
            </div>
            
            <div id="registerSuccess" class="hidden text-center">
                <div class="success-icon" style="font-size: 3rem; color: var(--success-color);">✓</div>
                <h3>¡Cuenta creada exitosamente!</h3>
                <div class="user-summary-box my-4" style="text-align: left;">
                    <p><strong>Número de Cuenta:</strong> <span id="summaryAccount"></span></p>
                    <p><strong>Fecha de Creación:</strong> <span id="summaryDate"></span></p>
                </div>
                <div class="mt-4">
                    <a href="index.html" class="btn btn-primary btn-block">Ir a Iniciar Sesión</a>
                </div>
            </div>
        </div>
    </div>
    <div id="toastContainer"></div>
    <script type="module" src="js/register.js"></script>
</body>
</html>
